<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Snake.exe - Arcadeium</title>
    <link rel="stylesheet" href="retro-desktop.css">
</head>

<body>
    <!-- Game Menu Bar -->
    <div class="game-menu-bar">
        <a href="index.html" class="game-menu-button">← Desktop</a>
        <div class="game-menu-button" onclick="showHelp()">Help</div>
        <div class="game-menu-button" onclick="togglePause()">Pause</div>
    </div>

    <!-- Game Window -->
    <div class="game-window">
        <div class="window-title">
            <span>🐍 Snake.exe - Arcadeium Games</span>
            <div class="window-controls">
                <div class="window-button" onclick="minimizeWindow()">_</div>
                <div class="window-button" onclick="window.location.href='index.html'">×</div>
            </div>
        </div>
        
        <div class="game-content">
            <!-- HUD Panel -->
            <div class="hud-panel">
                <div class="hud-item">
                    <span class="hud-label">Score:</span>
                    <span class="hud-value" id="score">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Length:</span>
                    <span class="hud-value" id="length">1</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Speed:</span>
                    <span class="hud-value" id="speed">1</span>
                </div>
            </div>

            <!-- Game Canvas -->
            <canvas id="game"></canvas>
            
            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-section">
                    <div class="control-title">Game Controls:</div>
                    <div class="control-text">
                        Arrow Keys: Move Snake • Space: Pause Game<br>
                        Eat the red food to grow longer and increase your score!
                    </div>
                </div>
            </div>

            <!-- Button Container -->
            <div class="button-container">
                <button class="retro-button primary" onclick="restartGame()">New Game</button>
                <button class="retro-button" onclick="togglePause()">Pause</button>
                <button class="retro-button" onclick="showHelp()">Help</button>
            </div>
        </div>
    </div>

    <!-- Game Over Dialog -->
    <div class="game-over" id="gameOver" style="display: none;">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Final Length: <span id="finalLength">1</span></p>
        <button class="retro-button primary" onclick="restartGame()">Play Again</button>
        <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // Audio setup
        let audioEnabled = false;
        const foodSound = new Audio('music/snake_food.mp3');
        const gameOverSound = new Audio('music/snake_gameover.mp3');
        const movementSound = new Audio('music/snake_movement.mp3');
        
        foodSound.volume = 0.6;
        gameOverSound.volume = 0.7;
        movementSound.volume = 0.3;
        movementSound.loop = true;

        // Enable audio on first user interaction
        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                // Try to load audio files
                foodSound.load();
                gameOverSound.load();
                movementSound.load();
            }
        }

        function playSound(sound) {
            if (audioEnabled) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        // Grid configuration - ensure exact fit
        const box = 20;
        const cols = 24;
        const rows = 18;
        
        // Set canvas size based on grid
        canvas.width = cols * box;
        canvas.height = rows * box;

        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = generateFood();
        let dx = 0;
        let dy = 0;
        let game = null;
        let gameStarted = false;
        let gameRunning = false;
        let paused = false;
        let score = 0;
        let speed = 1;
        let gameSpeed = 150;

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * cols) * box,
                    y: Math.floor(Math.random() * rows) * box
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            return newFood;
        }

        document.addEventListener("keydown", (e) => {
            // Prevent default behavior for arrow keys and space to avoid page scrolling
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
                e.preventDefault();
            }
            
            if (!gameStarted && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                enableAudio(); // Enable audio on first interaction
                gameStarted = true;
                gameRunning = true;
                setDirection(e);
                game = setInterval(draw, gameSpeed);
                
                // Start movement sound
                if (audioEnabled) {
                    movementSound.play().catch(e => console.log('Audio play failed:', e));
                }
            } else if (gameStarted && gameRunning) {
                if (e.key === ' ') {
                    togglePause();
                } else {
                    setDirection(e);
                }
            }
        });

        function setDirection(e) {
            if (e.key === "ArrowLeft" && dx === 0) {
                dx = -box; dy = 0;
            } else if (e.key === "ArrowUp" && dy === 0) {
                dx = 0; dy = -box;
            } else if (e.key === "ArrowRight" && dx === 0) {
                dx = box; dy = 0;
            } else if (e.key === "ArrowDown" && dy === 0) {
                dx = 0; dy = box;
            }
        }

        function togglePause() {
            paused = !paused;
            if (paused) {
                clearInterval(game);
                drawPauseScreen();
            } else {
                game = setInterval(draw, gameSpeed);
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "#0a4d4d";
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += box) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += box) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = "#00FF00";
                    ctx.fillRect(segment.x + 2, segment.y + 2, box - 4, box - 4);
                    
                    // Eyes
                    ctx.fillStyle = "#000";
                    ctx.fillRect(segment.x + 6, segment.y + 6, 4, 4);
                    ctx.fillRect(segment.x + 15, segment.y + 6, 4, 4);
                } else {
                    // Body
                    const gradient = ctx.createLinearGradient(segment.x, segment.y, segment.x + box, segment.y + box);
                    gradient.addColorStop(0, "#00CC00");
                    gradient.addColorStop(1, "#008800");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(segment.x + 1, segment.y + 1, box - 2, box - 2);
                    
                    // Body pattern
                    ctx.fillStyle = "#00FF00";
                    ctx.fillRect(segment.x + 5, segment.y + 5, box - 10, box - 10);
                }
            });
        }

        function drawFood() {
            // Animated food
            const time = Date.now() * 0.01;
            const pulse = Math.sin(time) * 0.1 + 0.9;
            
            ctx.fillStyle = "#FF0000";
            const size = box * pulse;
            const offset = (box - size) / 2;
            ctx.fillRect(food.x + offset, food.y + offset, size, size);
            
            // Food shine effect
            ctx.fillStyle = "#FF6666";
            ctx.fillRect(food.x + 5, food.y + 5, 8, 8);
        }

        function drawPauseScreen() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00FFFF";
            ctx.font = "30px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
            ctx.font = "16px Orbitron";
            ctx.fillText("Press SPACE to continue", canvas.width / 2, canvas.height / 2 + 40);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('speed').textContent = speed;
        }

        function draw() {
            if (paused) return;
            
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            drawSnake();
            drawFood();

            let head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check collisions
            if (
                head.x < 0 || head.y < 0 ||
                head.x >= canvas.width || head.y >= canvas.height ||
                snake.some(s => s.x === head.x && s.y === head.y)
            ) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10 * speed;
                food = generateFood();
                
                // Play food sound
                playSound(foodSound);
                
                // Increase speed every 5 food items
                if (snake.length % 5 === 0) {
                    speed++;
                    gameSpeed = Math.max(50, gameSpeed - 10);
                    clearInterval(game);
                    game = setInterval(draw, gameSpeed);
                }
                
                updateDisplay();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            clearInterval(game);
            gameRunning = false;
            
            // Stop movement sound and play game over sound
            if (audioEnabled) {
                movementSound.pause();
                movementSound.currentTime = 0;
            }
            playSound(gameOverSound);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            snake = [{ x: 10 * box, y: 10 * box }];
            food = generateFood();
            dx = 0;
            dy = 0;
            score = 0;
            speed = 1;
            gameSpeed = 150;
            gameStarted = false;
            gameRunning = false;
            paused = false;
            
            // Stop all sounds
            if (audioEnabled) {
                movementSound.pause();
                movementSound.currentTime = 0;
            }
            
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            
            // Draw initial screen
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawSnake();
            drawFood();
            
            ctx.fillStyle = "#00FF00";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText("Press Arrow Keys to Start", canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillText("Snake.exe v1.0", canvas.width / 2, canvas.height / 2 + 20);
        }

        function showHelp() {
            alert('🐍 Snake.exe Help\n\nObjective: Eat food to grow your snake!\n\nControls:\n• Arrow Keys - Move snake\n• Space - Pause game\n\nRules:\n• Don\'t hit walls or yourself\n• Eat red food to grow\n• Speed increases as you grow\n\nGood luck!');
        }

        function minimizeWindow() {
            alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)');
        }

        // Enable audio on any click
        document.addEventListener('click', enableAudio);
        
        // Initialize game
        updateDisplay();
        restartGame();
    </script>

</body>

</html>
