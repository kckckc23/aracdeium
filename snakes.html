<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Snake.exe - Arcadeium</title>
    <link rel="stylesheet" href="retro-desktop.css">
</head>

<body>
    <!-- Game Menu Bar -->
    <div class="game-menu-bar">
        <a href="index.html" class="game-menu-button">← Desktop</a>
        <div class="game-menu-button" onclick="showHelp()">Help</div>
        <div class="game-menu-button" onclick="togglePause()">Pause</div>
    </div>

    <!-- Game Window -->
    <div class="game-window">
        <div class="window-title">
            <span>🐍 Snake.exe - Arcadeium Games</span>
            <div class="window-controls">
                <div class="window-button" onclick="minimizeWindow()">_</div>
                <div class="window-button" onclick="window.location.href='index.html'">×</div>
            </div>
        </div>

        <div class="game-content">
            <!-- HUD Panel -->
            <div class="hud-panel">
                <div class="hud-item">
                    <span class="hud-label">Score:</span>
                    <span class="hud-value" id="score">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Length:</span>
                    <span class="hud-value" id="length">1</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Speed:</span>
                    <span class="hud-value" id="speed">1</span>
                </div>
            </div>

            <!-- Game Canvas -->
            <div class="screen-cell"><canvas id="game"></canvas></div>

            <!-- Side panel: instructions + buttons -->
            <div class="side-cell">
            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-section">
                    <div class="control-title">Game Controls:</div>
                    <div class="control-text">
                        Arrow Keys: Move Snake • Space: Pause Game<br>
                        Eat the red food to grow longer and increase your score!
                    </div>
                </div>
            </div>

            <!-- Button Container -->
            <div class="button-container">
                <button class="retro-button primary" onclick="restartGame()">New Game</button>
                <button class="retro-button" onclick="togglePause()">Pause</button>
                <button class="retro-button" onclick="showHelp()">Help</button>
            </div>
            </div>
        </div>
    </div>

    <!-- Game Over Dialog -->
    <div class="game-over" id="gameOver" style="display: none;">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Final Length: <span id="finalLength">1</span></p>
        <button class="retro-button primary" onclick="restartGame()">Play Again</button>
        <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const BOX = 20, COLS = 24, ROWS = 18;
        canvas.width = COLS * BOX;
        canvas.height = ROWS * BOX;

        // ── Audio ────────────────────────────────────────────
        let audioEnabled = false;
        const foodSound = new Audio('music/snakes_food.mp3');
        const gameOverSound = new Audio('music/snakes_gameover.mp3');
        const movementSound = new Audio('music/snakes_movement.mp3');
        foodSound.volume = 0.6; gameOverSound.volume = 0.7;
        movementSound.volume = 0.25; movementSound.loop = true;
        function enableAudio() {
            if (!audioEnabled) { audioEnabled = true; foodSound.load(); gameOverSound.load(); movementSound.load(); }
        }
        function playSound(s) { if (audioEnabled) { s.currentTime = 0; s.play().catch(() => {}); } }

        // ── State ────────────────────────────────────────────
        let snake, dir, dirQueue, food, score, eaten, stepMs, acc, state, lastTs, animTime, loopRunning;

        function reset() {
            snake = [{ x: 8, y: 9 }, { x: 7, y: 9 }, { x: 6, y: 9 }];
            dir = { x: 1, y: 0 };
            dirQueue = [];
            score = 0; eaten = 0; stepMs = 140; acc = 0;
            food = newFood();
            state = 'ready';            // ready | play | paused | over
            updateDisplay();
        }

        function newFood() {
            let f;
            do { f = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 }; }
            while (snake.some(s => s.x === f.x && s.y === f.y));
            return f;
        }

        const speedLevel = () => 1 + Math.floor(eaten / 5);

        // ── Input (queued — prevents reversing into yourself) ──
        function queueDir(nd) {
            const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
            if (nd.x === -last.x && nd.y === -last.y) return;   // no reverse
            if (nd.x === last.x && nd.y === last.y) return;     // no duplicate
            if (dirQueue.length < 2) dirQueue.push(nd);
        }

        // ── Step ─────────────────────────────────────────────
        function step() {
            if (dirQueue.length) dir = dirQueue.shift();

            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * speedLevel();
                eaten++;
                food = newFood();
                playSound(foodSound);
                stepMs = Math.max(60, 140 - eaten * 5);   // smooth speed ramp
                updateDisplay();
            } else {
                snake.pop();
            }
        }

        // ── Render ───────────────────────────────────────────
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255,176,0,0.06)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * BOX, 0); ctx.lineTo(x * BOX, canvas.height); ctx.stroke(); }
            for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * BOX); ctx.lineTo(canvas.width, y * BOX); ctx.stroke(); }
        }

        function cell(x, y, w, h, r) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); }

        function drawSnake() {
            for (let i = snake.length - 1; i >= 0; i--) {
                const s = snake[i];
                const px = s.x * BOX, py = s.y * BOX;
                if (i === 0) {
                    ctx.save(); ctx.shadowColor = '#4dff88'; ctx.shadowBlur = 10;
                    ctx.fillStyle = '#7dffac';
                    cell(px + 1, py + 1, BOX - 2, BOX - 2, 6);
                    ctx.restore();
                    // eyes facing direction
                    ctx.fillStyle = '#04240f';
                    const ex = dir.x, ey = dir.y;
                    const cx = px + BOX / 2, cy = py + BOX / 2;
                    const ox = ey !== 0 ? 4 : 4 * ex, oy = ex !== 0 ? 4 : 4 * ey;
                    ctx.beginPath();
                    ctx.arc(cx + (ey ? -4 : ox), cy + (ex ? -4 : oy), 2, 0, 7);
                    ctx.arc(cx + (ey ? 4 : ox), cy + (ex ? 4 : oy), 2, 0, 7);
                    ctx.fill();
                } else {
                    const t = i / snake.length;
                    ctx.fillStyle = `rgb(${30 + t * 20}, ${200 - t * 70}, ${100 - t * 30})`;
                    cell(px + 2, py + 2, BOX - 4, BOX - 4, 5);
                }
            }
        }

        function drawFood() {
            const pulse = Math.sin(animTime * 6) * 0.15 + 0.85;
            const cx = food.x * BOX + BOX / 2, cy = food.y * BOX + BOX / 2;
            ctx.save();
            ctx.shadowColor = '#ff4533'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#ff5a47';
            ctx.beginPath(); ctx.arc(cx, cy, (BOX / 2 - 2) * pulse, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#ffd9b0';
            ctx.beginPath(); ctx.arc(cx - 2, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
        }

        function centerText(big, small) {
            ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffb000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillText(big, canvas.width / 2, canvas.height / 2 - 12);
            if (small) { ctx.font = '16px "VT323", monospace'; ctx.fillText(small, canvas.width / 2, canvas.height / 2 + 22); }
        }

        function render() {
            ctx.fillStyle = '#04040a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid(); drawFood(); drawSnake();
            if (state === 'ready') centerText('SNAKE.EXE', 'Press an arrow key to start');
            if (state === 'paused') centerText('PAUSED', 'Press space to resume');
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('speed').textContent = speedLevel();
        }

        function gameOver() {
            state = 'over';
            if (audioEnabled) { movementSound.pause(); movementSound.currentTime = 0; }
            playSound(gameOverSound);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOver').style.display = 'block';
        }

        // ── Loop ─────────────────────────────────────────────
        function loop(ts) {
            if (!lastTs) lastTs = ts;
            const dt = ts - lastTs; lastTs = ts; animTime += dt / 1000;
            if (state === 'play') {
                acc += dt;
                while (acc >= stepMs && state === 'play') { acc -= stepMs; step(); }
            }
            render();
            if (state === 'over') { loopRunning = false; return; }
            requestAnimationFrame(loop);
        }

        function startLoop() { if (!loopRunning) { loopRunning = true; lastTs = 0; requestAnimationFrame(loop); } }

        function restartGame() {
            reset();
            document.getElementById('gameOver').style.display = 'none';
            startLoop();
        }

        function togglePause() {
            if (state === 'play') { state = 'paused'; if (audioEnabled) movementSound.pause(); }
            else if (state === 'paused') { state = 'play'; if (audioEnabled) movementSound.play().catch(() => {}); }
        }

        function showHelp() {
            alert('🐍 Snake.exe Help\n\nObjective: Eat food to grow as long as you can!\n\nControls:\n• Arrow Keys - Move snake\n• Space - Pause / resume\n\nRules:\n• Don\'t hit the walls or your own tail\n• Each food grows you and adds score\n• You speed up every 5 food eaten\n\nGood luck!');
        }
        function minimizeWindow() { alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)'); }

        document.addEventListener('keydown', (e) => {
            const map = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };
            if (e.key === ' ') { e.preventDefault(); if (state === 'play' || state === 'paused') togglePause(); return; }
            if (!(e.key in map)) return;
            e.preventDefault();
            enableAudio();
            if (state === 'ready') {
                state = 'play';
                if (audioEnabled) movementSound.play().catch(() => {});
            }
            if (state === 'play') queueDir(map[e.key]);
        });
        document.addEventListener('click', enableAudio);

        // Boot
        restartGame();
    </script>

</body>

</html>
