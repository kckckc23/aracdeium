<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🐍 SNAKE - Retro Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        canvas {
            background: #000;
            display: block;
            margin: 40px auto;
            border: 3px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        body {
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: #00ffff;
            background: linear-gradient(45deg, #0a0a0a, #1a0a2e, #16213e);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 1rem;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.5);
        }

        p {
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            justify-content: center;
            margin-top: 2rem;
        }

        .info-panel {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 1.5rem;
            min-width: 200px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .info-panel h3 {
            color: #ff00ff;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.5rem;
        }

        .score, .length, .speed {
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .controls {
            margin-top: 2rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .controls h4 {
            color: #00ffff;
            margin-bottom: 0.5rem;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ff00ff;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .game-over h2 {
            color: #ff00ff;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .restart-button {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            color: #000;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                min-width: auto;
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>

<body>
    <button class="back-button" onclick="window.location.href='index.html'">← BACK TO ARCADE</button>
    <h1>🐍 SNAKE</h1>
    <div class="game-container">
        <canvas id="game" width="500" height="500"></canvas>
        
        <div class="info-panel">
            <h3>🐍 SNAKE</h3>
            <div class="score">Score: <span id="score">0</span></div>
            <div class="length">Length: <span id="length">1</span></div>
            <div class="speed">Speed: <span id="speed">1</span></div>
            
            <div class="controls">
                <h4>Controls:</h4>
                <div>← → ↑ ↓ Move</div>
                <div>Space: Pause</div>
                <div>Eat food to grow!</div>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">GAME OVER</h2>
        <div>Final Score: <span id="finalScore">0</span></div>
        <div>Final Length: <span id="finalLength">1</span></div>
        <button class="restart-button" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // Audio setup
        let audioEnabled = false;
        const foodSound = new Audio('music/snake_food.mp3');
        const gameOverSound = new Audio('music/snake_gameover.mp3');
        const movementSound = new Audio('music/snake_movement.mp3');
        
        foodSound.volume = 0.6;
        gameOverSound.volume = 0.7;
        movementSound.volume = 0.3;
        movementSound.loop = true;

        // Enable audio on first user interaction
        function enableAudio() {
            if (!audioEnabled) {
                audioEnabled = true;
                // Try to load audio files
                foodSound.load();
                gameOverSound.load();
                movementSound.load();
            }
        }

        function playSound(sound) {
            if (audioEnabled) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        const box = 25;
        const rows = canvas.height / box;
        const cols = canvas.width / box;

        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = generateFood();
        let dx = 0;
        let dy = 0;
        let game = null;
        let gameStarted = false;
        let gameRunning = false;
        let paused = false;
        let score = 0;
        let speed = 1;
        let gameSpeed = 150;

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * cols) * box,
                    y: Math.floor(Math.random() * rows) * box
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            return newFood;
        }

        document.addEventListener("keydown", (e) => {
            // Prevent default behavior for arrow keys and space to avoid page scrolling
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
                e.preventDefault();
            }
            
            if (!gameStarted && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                enableAudio(); // Enable audio on first interaction
                gameStarted = true;
                gameRunning = true;
                setDirection(e);
                game = setInterval(draw, gameSpeed);
                
                // Start movement sound
                if (audioEnabled) {
                    movementSound.play().catch(e => console.log('Audio play failed:', e));
                }
            } else if (gameStarted && gameRunning) {
                if (e.key === ' ') {
                    togglePause();
                } else {
                    setDirection(e);
                }
            }
        });

        function setDirection(e) {
            if (e.key === "ArrowLeft" && dx === 0) {
                dx = -box; dy = 0;
            } else if (e.key === "ArrowUp" && dy === 0) {
                dx = 0; dy = -box;
            } else if (e.key === "ArrowRight" && dx === 0) {
                dx = box; dy = 0;
            } else if (e.key === "ArrowDown" && dy === 0) {
                dx = 0; dy = box;
            }
        }

        function togglePause() {
            paused = !paused;
            if (paused) {
                clearInterval(game);
                drawPauseScreen();
            } else {
                game = setInterval(draw, gameSpeed);
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "#0a4d4d";
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += box) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += box) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = "#00FF00";
                    ctx.fillRect(segment.x + 2, segment.y + 2, box - 4, box - 4);
                    
                    // Eyes
                    ctx.fillStyle = "#000";
                    ctx.fillRect(segment.x + 6, segment.y + 6, 4, 4);
                    ctx.fillRect(segment.x + 15, segment.y + 6, 4, 4);
                } else {
                    // Body
                    const gradient = ctx.createLinearGradient(segment.x, segment.y, segment.x + box, segment.y + box);
                    gradient.addColorStop(0, "#00CC00");
                    gradient.addColorStop(1, "#008800");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(segment.x + 1, segment.y + 1, box - 2, box - 2);
                    
                    // Body pattern
                    ctx.fillStyle = "#00FF00";
                    ctx.fillRect(segment.x + 5, segment.y + 5, box - 10, box - 10);
                }
            });
        }

        function drawFood() {
            // Animated food
            const time = Date.now() * 0.01;
            const pulse = Math.sin(time) * 0.1 + 0.9;
            
            ctx.fillStyle = "#FF0000";
            const size = box * pulse;
            const offset = (box - size) / 2;
            ctx.fillRect(food.x + offset, food.y + offset, size, size);
            
            // Food shine effect
            ctx.fillStyle = "#FF6666";
            ctx.fillRect(food.x + 5, food.y + 5, 8, 8);
        }

        function drawPauseScreen() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00FFFF";
            ctx.font = "30px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
            ctx.font = "16px Orbitron";
            ctx.fillText("Press SPACE to continue", canvas.width / 2, canvas.height / 2 + 40);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('speed').textContent = speed;
        }

        function draw() {
            if (paused) return;
            
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            drawSnake();
            drawFood();

            let head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check collisions
            if (
                head.x < 0 || head.y < 0 ||
                head.x >= canvas.width || head.y >= canvas.height ||
                snake.some(s => s.x === head.x && s.y === head.y)
            ) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10 * speed;
                food = generateFood();
                
                // Play food sound
                playSound(foodSound);
                
                // Increase speed every 5 food items
                if (snake.length % 5 === 0) {
                    speed++;
                    gameSpeed = Math.max(50, gameSpeed - 10);
                    clearInterval(game);
                    game = setInterval(draw, gameSpeed);
                }
                
                updateDisplay();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            clearInterval(game);
            gameRunning = false;
            
            // Stop movement sound and play game over sound
            if (audioEnabled) {
                movementSound.pause();
                movementSound.currentTime = 0;
            }
            playSound(gameOverSound);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            snake = [{ x: 10 * box, y: 10 * box }];
            food = generateFood();
            dx = 0;
            dy = 0;
            score = 0;
            speed = 1;
            gameSpeed = 150;
            gameStarted = false;
            gameRunning = false;
            paused = false;
            
            // Stop all sounds
            if (audioEnabled) {
                movementSound.pause();
                movementSound.currentTime = 0;
            }
            
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            
            // Draw initial screen
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawSnake();
            drawFood();
            
            ctx.fillStyle = "#00FFFF";
            ctx.font = "20px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText("Press an arrow key to start", canvas.width / 2, canvas.height / 2 - 50);
        }

        // Enable audio on any click
        document.addEventListener('click', enableAudio);
        
        // Initialize game
        updateDisplay();
        restartGame();
    </script>

</body>

</html>
