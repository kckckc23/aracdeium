<!DOCTYPE html>
<html>
<head>
  <title>TicTac.exe - Arcadeium</title>
  <link rel="stylesheet" href="retro-desktop.css">
  <style>
    /* Override any remaining neon styles - use flat retro OS styling only */
    #status {
      font-size: 12px;
      color: #2f4f4f;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <!-- Game Menu Bar -->
  <div class="game-menu-bar">
    <a href="index.html" class="game-menu-button">← Desktop</a>
    <div class="game-menu-button" onclick="showHelp()">Help</div>
    <div class="game-menu-button" onclick="resetGame()">New Game</div>
  </div>

  <!-- Game Window -->
  <div class="game-window">
    <div class="window-title">
      <span>⭕ TicTac.exe - Arcadeium Games</span>
      <div class="window-controls">
        <div class="window-button" onclick="minimizeWindow()">_</div>
        <div class="window-button" onclick="window.location.href='index.html'">×</div>
      </div>
    </div>
    
    <div class="game-content">
      <!-- HUD Panel -->
      <div class="hud-panel">
        <div class="hud-item">
          <span class="hud-label">Current Player:</span>
          <span class="hud-value" id="currentPlayerDisplay">X</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Game Status:</span>
          <span class="hud-value" id="gameStatus">Playing</span>
        </div>
      </div>

      <!-- Game Board -->
      <div style="text-align: center; margin: 20px 0;">
        <div id="board"></div>
        <p id="status" style="margin-top: 16px; font-size: 12px;"></p>
      </div>
      
      <!-- Control Panel -->
      <div class="control-panel">
        <div class="control-section">
          <div class="control-title">Game Rules:</div>
          <div class="control-text">
            Click any empty square to place your mark (X or O)<br>
            Get three in a row horizontally, vertically, or diagonally to win!
          </div>
        </div>
      </div>

      <!-- Button Container -->
      <div class="button-container">
        <button class="retro-button primary" onclick="resetGame()">New Game</button>
        <button class="retro-button" onclick="showHelp()">Help</button>
      </div>
    </div>
  </div>

  <!-- Game Over Dialog -->
  <div class="game-over" id="gameOver" style="display: none;">
    <h2 id="gameOverTitle">Game Over!</h2>
    <p id="gameResult"></p>
    <button class="retro-button primary" onclick="resetGame()">Play Again</button>
    <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    let cells = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;

    function renderBoard() {
      board.innerHTML = '';
      cells.forEach((value, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = value;
        cell.onclick = () => makeMove(i);
        board.appendChild(cell);
      });
    }

    function makeMove(i) {
      if (cells[i] === '' && !gameOver) {
        cells[i] = currentPlayer;
        updateHUD();
        
        if (checkWin()) {
          status.textContent = `${currentPlayer} wins!`;
          gameOver = true;
          document.getElementById('gameStatus').textContent = `${currentPlayer} Wins!`;
          showGameOver(`${currentPlayer} WINS!`);
        } else if (!cells.includes('')) {
          status.textContent = `It's a draw!`;
          gameOver = true;
          document.getElementById('gameStatus').textContent = 'Draw';
          showGameOver("IT'S A DRAW!");
        } else {
          currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
          status.textContent = `Player ${currentPlayer}'s turn`;
        }
        renderBoard();
      }
    }

    function updateHUD() {
      document.getElementById('currentPlayerDisplay').textContent = currentPlayer;
      if (!gameOver) {
        document.getElementById('gameStatus').textContent = 'Playing';
      }
    }

    function showGameOver(result) {
      document.getElementById('gameResult').textContent = result;
      document.getElementById('gameOver').style.display = 'block';
    }

    function resetGame() {
      cells = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      document.getElementById('gameOver').style.display = 'none';
      updateHUD();
      renderBoard();
    }

    function showHelp() {
      alert('⭕ TicTac.exe Help\n\nObjective: Get three in a row!\n\nRules:\n• Players take turns placing X and O\n• First to get 3 in a row wins\n• Rows can be horizontal, vertical, or diagonal\n• If all squares are filled with no winner, it\'s a draw\n\nGood luck!');
    }

    function minimizeWindow() {
      alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)');
    }

    function checkWin() {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      return wins.some(combo => {
        const [a,b,c] = combo;
        return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
      });
    }

    // Initialize game
    status.textContent = "Player X's turn";
    updateHUD();
    renderBoard();
  </script>
</body>
</html>
