<!-- Save as tictactoe.html -->
<!DOCTYPE html>
<html>
<head>
  <title>🎯 TIC-TAC-TOE - Retro Arcade</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(45deg, #0a0a0a, #1a0a2e, #16213e);
      font-family: 'Orbitron', monospace;
      color: #00ffff;
      min-height: 100vh;
      text-align: center;
    }
    
    h2 {
      font-size: 3rem;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 2rem;
    }
    
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
      margin: 50px auto;
      width: 315px;
    }
    
    .cell {
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 2px solid #00ffff;
      font-size: 3em;
      text-align: center;
      line-height: 100px;
      cursor: pointer;
      color: #ff00ff;
      font-weight: bold;
      border-radius: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }
    
    .cell:hover {
      transform: scale(1.05);
      border-color: #ff00ff;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
    }
    
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      border: none;
      color: #000;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .back-button:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(255, 0, 255, 0.5);
    }

    #status {
      font-size: 1.5rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-top: 2rem;
    }

    .game-over {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 3px solid #ff00ff;
      border-radius: 15px;
      padding: 2rem;
      text-align: center;
      display: none;
      z-index: 1000;
    }

    .game-over h2 {
      color: #ff00ff;
      margin-bottom: 1rem;
      font-size: 2rem;
    }

    .restart-button {
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      color: #000;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <button class="back-button" onclick="window.location.href='index.html'">← BACK TO ARCADE</button>
  <h2>🎯 TIC-TAC-TOE</h2>
  <div id="board"></div>
  <p id="status" style="text-align:center;"></p>

  <div class="game-over" id="gameOver">
    <h2 id="gameOverTitle">GAME OVER</h2>
    <div id="gameResult"></div>
    <button class="restart-button" onclick="restartGame()">PLAY AGAIN</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    let cells = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;

    function renderBoard() {
      board.innerHTML = '';
      cells.forEach((value, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = value;
        cell.onclick = () => makeMove(i);
        board.appendChild(cell);
      });
    }

    function makeMove(i) {
      if (cells[i] === '' && !gameOver) {
        cells[i] = currentPlayer;
        if (checkWin()) {
          status.textContent = `${currentPlayer} wins!`;
          gameOver = true;
          showGameOver(`${currentPlayer} WINS!`);
        } else if (!cells.includes('')) {
          status.textContent = `It's a draw!`;
          gameOver = true;
          showGameOver("IT'S A DRAW!");
        } else {
          currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
          status.textContent = `Player ${currentPlayer}'s turn`;
        }
        renderBoard();
      }
    }

    function showGameOver(result) {
      document.getElementById('gameResult').textContent = result;
      document.getElementById('gameOver').style.display = 'block';
    }

    function restartGame() {
      cells = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      document.getElementById('gameOver').style.display = 'none';
      renderBoard();
    }

    function checkWin() {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      return wins.some(combo => {
        const [a,b,c] = combo;
        return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
      });
    }

    status.textContent = "Player X's turn";
    renderBoard();
  </script>
</body>
</html>
