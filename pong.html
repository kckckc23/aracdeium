<!DOCTYPE html>
<html>
<head>
  <title>Pong.exe - Arcadeium</title>
  <link rel="stylesheet" href="retro-desktop.css">
</head>
<body>
  <!-- Game Menu Bar -->
  <div class="game-menu-bar">
    <a href="index.html" class="game-menu-button">← Desktop</a>
    <div class="game-menu-button" onclick="showHelp()">Help</div>
    <div class="game-menu-button" onclick="pauseGame()">Pause</div>
  </div>

  <!-- Game Window -->
  <div class="game-window">
    <div class="window-title">
      <span>🏓 Pong.exe - Arcadeium Games</span>
      <div class="window-controls">
        <div class="window-button" onclick="minimizeWindow()">_</div>
        <div class="window-button" onclick="window.location.href='index.html'">×</div>
      </div>
    </div>

    <div class="game-content">
      <!-- HUD Panel -->
      <div class="hud-panel">
        <div class="hud-item">
          <span class="hud-label">Player:</span>
          <span class="hud-value" id="playerScoreDisplay">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Computer:</span>
          <span class="hud-value" id="aiScoreDisplay">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Speed:</span>
          <span class="hud-value" id="speedDisplay">1.0x</span>
        </div>
      </div>

      <!-- Game Canvas -->
      <div class="screen-cell"><canvas id="pong" width="560" height="320"></canvas></div>

      <!-- Side panel: instructions + buttons -->
      <div class="side-cell">
      <!-- Control Panel -->
      <div class="control-panel">
        <div class="control-section">
          <div class="control-title">Game Controls:</div>
          <div class="control-text">
            Mouse or ↑/↓ (W/S): Move your paddle<br>
            First to 10 points wins! The ball speeds up every rally.
          </div>
        </div>
      </div>

      <!-- Button Container -->
      <div class="button-container">
        <button class="retro-button primary" onclick="restartGame()">New Game</button>
        <button class="retro-button" onclick="pauseGame()">Pause</button>
        <button class="retro-button" onclick="showHelp()">Help</button>
      </div>
      </div>
    </div>
  </div>

  <!-- Game Over Dialog -->
  <div class="game-over" id="gameOver" style="display: none;">
    <h2 id="gameOverTitle">Game Over!</h2>
    <p>Player Score: <span id="playerScore">0</span></p>
    <p>Computer Score: <span id="aiScore">0</span></p>
    <button class="retro-button primary" onclick="restartGame()">Play Again</button>
    <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
  </div>

  <script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    const ballHitSound = new Audio('music/pong_ballhit.mp3');
    ballHitSound.volume = 0.5;
    function playHit() { ballHitSound.currentTime = 0; ballHitSound.play().catch(() => {}); }

    const COL = { player: '#ffb000', ai: '#ff4533', ball: '#ffe7b0', net: 'rgba(255,176,0,.28)', text: '#ffb000' };

    const PADDLE_W = 12, PADDLE_H = 92;
    const BASE_SPEED = 300, SPEED_INC = 16, MAX_SPEED = 660;   // px/sec
    const MAX_ANGLE = 1.05;                                    // ~60° off horizontal
    const KEY_SPEED = 380;                                     // player keyboard px/sec
    const MAX_SCORE = 10;

    const player = { x: 8, y: H / 2 - PADDLE_H / 2 };
    const ai = { x: W - 8 - PADDLE_W, y: H / 2 - PADDLE_H / 2, err: 0 };
    const ball = { x: W / 2, y: H / 2, r: 8, vx: 0, vy: 0, speed: BASE_SPEED };
    const keys = { up: false, down: false };

    let pScore = 0, aScore = 0, rally = 0;
    let state = 'serve', serveTimer = 1.0, serveDir = 1;   // serve|play|paused|over
    let paused = false, loopRunning = false, lastTs = 0, animTime = 0;

    function resetBall(towards) {
      ball.x = W / 2; ball.y = H / 2; ball.speed = BASE_SPEED;
      ball.vx = 0; ball.vy = 0; rally = 0;
      serveDir = towards; state = 'serve'; serveTimer = 1.0;
      updateHUD();
    }
    function launchBall() {
      const angle = (Math.random() * 2 - 1) * 0.5;   // shallow opening serve
      ball.vx = Math.cos(angle) * ball.speed * serveDir;
      ball.vy = Math.sin(angle) * ball.speed;
      state = 'play';
    }

    function bounceOffPaddle(p, dir) {
      const hit = Math.max(-1, Math.min(1, (ball.y - (p.y + PADDLE_H / 2)) / (PADDLE_H / 2)));
      const angle = hit * MAX_ANGLE;
      ball.speed = Math.min(MAX_SPEED, ball.speed + SPEED_INC);
      ball.vx = Math.cos(angle) * ball.speed * dir;
      ball.vy = Math.sin(angle) * ball.speed;
      rally++;
      ai.err = (Math.random() * 2 - 1) * 26;   // re-roll AI aim error each exchange
      playHit();
      updateHUD();
    }

    function updateAI(dt) {
      // only chase when the ball is heading toward the AI; otherwise drift to centre
      const aiMax = 250 + Math.min(rally * 7, 150);   // 250→400 px/sec
      let targetY;
      if (ball.vx > 0) targetY = ball.y - PADDLE_H / 2 + ai.err;
      else targetY = H / 2 - PADDLE_H / 2;
      const dy = targetY - ai.y;
      const move = Math.sign(dy) * Math.min(aiMax * dt, Math.abs(dy));
      ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y + move));
    }

    function update(dt) {
      if (state === 'serve') {
        serveTimer -= dt;
        if (serveTimer <= 0) launchBall();
        return;
      }
      if (state !== 'play') return;

      // keyboard paddle
      if (keys.up) player.y -= KEY_SPEED * dt;
      if (keys.down) player.y += KEY_SPEED * dt;
      player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

      updateAI(dt);

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // top / bottom walls
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
      else if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); }

      // player paddle (left)
      if (ball.vx < 0 && ball.x - ball.r < player.x + PADDLE_W && ball.x - ball.r > player.x - 12 &&
          ball.y > player.y && ball.y < player.y + PADDLE_H) {
        ball.x = player.x + PADDLE_W + ball.r;
        bounceOffPaddle(player, 1);
      }
      // ai paddle (right)
      if (ball.vx > 0 && ball.x + ball.r > ai.x && ball.x + ball.r < ai.x + PADDLE_W + 12 &&
          ball.y > ai.y && ball.y < ai.y + PADDLE_H) {
        ball.x = ai.x - ball.r;
        bounceOffPaddle(ai, -1);
      }

      // scoring
      if (ball.x < -ball.r) { aScore++; afterPoint(1); }       // AI scored → serve toward player
      else if (ball.x > W + ball.r) { pScore++; afterPoint(-1); }
    }

    function afterPoint(serveTowards) {
      updateHUD();
      if (pScore >= MAX_SCORE || aScore >= MAX_SCORE) { endGame(); return; }
      resetBall(serveTowards);
    }

    function endGame() {
      state = 'over';
      document.getElementById('playerScore').textContent = pScore;
      document.getElementById('aiScore').textContent = aScore;
      document.getElementById('gameOverTitle').textContent = pScore >= MAX_SCORE ? 'YOU WIN!' : 'AI WINS!';
      document.getElementById('gameOver').style.display = 'block';
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      ctx.fillStyle = '#04040a';
      ctx.fillRect(0, 0, W, H);

      // net
      ctx.fillStyle = COL.net;
      for (let y = 6; y < H; y += 22) ctx.fillRect(W / 2 - 2, y, 4, 12);

      // scores
      ctx.fillStyle = COL.text;
      ctx.font = '28px "Press Start 2P", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.save(); ctx.shadowColor = 'rgba(255,176,0,.5)'; ctx.shadowBlur = 10;
      ctx.fillText(pScore, W / 4, 40);
      ctx.fillText(aScore, 3 * W / 4, 40);
      ctx.restore();

      // paddles (glow)
      ctx.save(); ctx.shadowBlur = 12;
      ctx.shadowColor = COL.player; ctx.fillStyle = COL.player;
      ctx.fillRect(player.x, player.y, PADDLE_W, PADDLE_H);
      ctx.shadowColor = COL.ai; ctx.fillStyle = COL.ai;
      ctx.fillRect(ai.x, ai.y, PADDLE_W, PADDLE_H);
      ctx.restore();

      // ball
      ctx.save(); ctx.shadowColor = '#fff'; ctx.shadowBlur = 14;
      ctx.fillStyle = COL.ball;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      if (state === 'serve') {
        ctx.fillStyle = COL.text;
        ctx.font = '20px "VT323", monospace';
        ctx.fillText('GET READY', W / 2, H / 2 + 40);
      }
      if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = COL.text; ctx.font = '24px "Press Start 2P", monospace';
        ctx.fillText('PAUSED', W / 2, H / 2);
      }
    }

    function updateHUD() {
      document.getElementById('playerScoreDisplay').textContent = pScore;
      document.getElementById('aiScoreDisplay').textContent = aScore;
      document.getElementById('speedDisplay').textContent = (ball.speed / BASE_SPEED).toFixed(1) + 'x';
    }

    // ── Loop ───────────────────────────────────────────────
    function loop(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts; animTime += dt;
      if (!paused && state !== 'over') update(dt);
      render();
      if (state === 'over') { loopRunning = false; return; }
      requestAnimationFrame(loop);
    }

    // ── Controls / hooks ───────────────────────────────────
    function movePaddle(evt) {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      const y = (evt.clientY - rect.top) * scaleY;
      player.y = Math.max(0, Math.min(H - PADDLE_H, y - PADDLE_H / 2));
    }

    function restartGame() {
      pScore = 0; aScore = 0; paused = false;
      player.y = ai.y = H / 2 - PADDLE_H / 2;
      document.getElementById('gameOver').style.display = 'none';
      resetBall(Math.random() < 0.5 ? 1 : -1);
      if (!loopRunning) { loopRunning = true; lastTs = 0; requestAnimationFrame(loop); }
    }

    function pauseGame() { if (state !== 'over') paused = !paused; }

    function showHelp() {
      alert('🏓 Pong.exe Help\n\nObjective: First to 10 points beats the computer!\n\nControls:\n• Mouse — move your paddle (left side)\n• ↑ / ↓ or W / S — keyboard control\n\nGameplay:\n• The ball speeds up the longer the rally lasts\n• Hit with the paddle edge for sharper angles\n• The CPU drifts to centre when the ball moves away\n\nGood luck!');
    }
    function minimizeWindow() { alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)'); }

    canvas.addEventListener('mousemove', movePaddle);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); keys.up = true; }
      else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); keys.down = true; }
      else if (e.key === 'p' || e.key === 'P') pauseGame();
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
      else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
    });

    // Boot
    restartGame();
  </script>
</body>
</html>
