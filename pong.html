<!DOCTYPE html>
<html>
<head>
  <title>Pong.exe - Arcadeium</title>
  <link rel="stylesheet" href="retro-desktop.css">
</head>
<body>
  <!-- Game Menu Bar -->
  <div class="game-menu-bar">
    <a href="index.html" class="game-menu-button">← Desktop</a>
    <div class="game-menu-button" onclick="showHelp()">Help</div>
    <div class="game-menu-button" onclick="pauseGame()">Pause</div>
  </div>

  <!-- Game Window -->
  <div class="game-window">
    <div class="window-title">
      <span>🏓 Pong.exe - Arcadeium Games</span>
      <div class="window-controls">
        <div class="window-button" onclick="minimizeWindow()">_</div>
        <div class="window-button" onclick="window.location.href='index.html'">×</div>
      </div>
    </div>
    
    <div class="game-content">
      <!-- HUD Panel -->
      <div class="hud-panel">
        <div class="hud-item">
          <span class="hud-label">Player:</span>
          <span class="hud-value" id="playerScoreDisplay">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Computer:</span>
          <span class="hud-value" id="aiScoreDisplay">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Speed:</span>
          <span class="hud-value" id="speedDisplay">1.0x</span>
        </div>
      </div>

      <!-- Game Canvas -->
      <canvas id="pong" width="560" height="320"></canvas>
      
      <!-- Control Panel -->
      <div class="control-panel">
        <div class="control-section">
          <div class="control-title">Game Controls:</div>
          <div class="control-text">
            Mouse Movement: Control your paddle (left side)<br>
            First to 10 points wins! Ball speed increases with each hit.
          </div>
        </div>
      </div>

      <!-- Button Container -->
      <div class="button-container">
        <button class="retro-button primary" onclick="restartGame()">New Game</button>
        <button class="retro-button" onclick="pauseGame()">Pause</button>
        <button class="retro-button" onclick="showHelp()">Help</button>
      </div>
    </div>
  </div>

  <!-- Game Over Dialog -->
  <div class="game-over" id="gameOver" style="display: none;">
    <h2 id="gameOverTitle">Game Over!</h2>
    <p>Player Score: <span id="playerScore">0</span></p>
    <p>Computer Score: <span id="aiScore">0</span></p>
    <button class="retro-button primary" onclick="restartGame()">Play Again</button>
    <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
  </div>

  <script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    // Audio setup
    const ballHitSound = new Audio('music/pong_ballhit.mp3');
    ballHitSound.volume = 0.5;

    const paddleWidth = 10, paddleHeight = 100;
    const player = { x: 0, y: canvas.height / 2 - 50, score: 0 };
    const ai = { x: canvas.width - 10, y: canvas.height / 2 - 50, score: 0 };
    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 8,
      baseSpeed: 4,
      currentSpeed: 4,
      dx: 4,
      dy: 4,
      bounces: 0
    };
    
    let gameRunning = true;
    const maxScore = 10;

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.fill();
    }

    function drawNet() {
      for (let i = 0; i < canvas.height; i += 15) {
        drawRect(canvas.width / 2 - 1, i, 2, 10, "#00FFFF");
      }
    }

    function drawScore() {
      ctx.fillStyle = "#00FFFF";
      ctx.font = "30px Orbitron";
      ctx.textAlign = "center";
      ctx.fillText(player.score, canvas.width / 4, 50);
      ctx.fillText(ai.score, 3 * canvas.width / 4, 50);
      
      // Speed indicator
      ctx.font = "16px Orbitron";
      ctx.fillText(`Speed: ${ball.currentSpeed.toFixed(1)}x`, canvas.width / 2, canvas.height - 20);
    }

    function movePaddle(evt) {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      player.y = Math.max(0, Math.min(canvas.height - paddleHeight, evt.clientY - rect.top - paddleHeight / 2));
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.currentSpeed = ball.baseSpeed;
      ball.dx = ball.baseSpeed * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = ball.baseSpeed * (Math.random() > 0.5 ? 1 : -1);
      ball.bounces = 0;
    }

    function update() {
      if (!gameRunning) return;
      
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Bounce off top/bottom
      if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        ball.dy = -ball.dy;
      }

      // AI Movement (slightly imperfect for gameplay)
      const aiCenter = ai.y + paddleHeight / 2;
      const ballCenter = ball.y;
      const aiSpeed = 4;
      
      if (ballCenter < aiCenter - 10) {
        ai.y = Math.max(0, ai.y - aiSpeed);
      } else if (ballCenter > aiCenter + 10) {
        ai.y = Math.min(canvas.height - paddleHeight, ai.y + aiSpeed);
      }

      // Choose paddle based on side
      const paddle = ball.x < canvas.width / 2 ? player : ai;

      // Collision with paddle
      if (
        ball.x - ball.radius < paddle.x + paddleWidth &&
        ball.x + ball.radius > paddle.x &&
        ball.y + ball.radius > paddle.y &&
        ball.y - ball.radius < paddle.y + paddleHeight
      ) {
        // Calculate hit position for angle variation
        const hitPos = (ball.y - (paddle.y + paddleHeight / 2)) / (paddleHeight / 2);
        
        // Reverse direction and increase speed
        ball.dx = -ball.dx;
        ball.dy = ball.dy + hitPos * 2; // Add spin based on hit position
        
        // Increase speed with each bounce
        ball.bounces++;
        ball.currentSpeed = Math.min(12, ball.baseSpeed + ball.bounces * 0.3);
        
        // Apply new speed
        const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        ball.dx = (ball.dx / speed) * ball.currentSpeed;
        ball.dy = (ball.dy / speed) * ball.currentSpeed;
        
        // Prevent sticking
        ball.x += ball.dx > 0 ? 15 : -15;
        
        // Play ball hit sound
        ballHitSound.currentTime = 0;
        ballHitSound.play().catch(e => console.log('Audio play failed:', e));
      }

      // Score when ball goes out of bounds
      if (ball.x < -ball.radius) {
        ai.score++;
        resetBall();
        checkGameEnd();
      } else if (ball.x > canvas.width + ball.radius) {
        player.score++;
        resetBall();
        checkGameEnd();
      }
    }

    function checkGameEnd() {
      if (player.score >= maxScore || ai.score >= maxScore) {
        gameRunning = false;
        document.getElementById('playerScore').textContent = player.score;
        document.getElementById('aiScore').textContent = ai.score;
        document.getElementById('gameOverTitle').textContent = 
          player.score >= maxScore ? 'YOU WIN!' : 'AI WINS!';
        document.getElementById('gameOver').style.display = 'block';
      }
    }

    function draw() {
      drawRect(0, 0, canvas.width, canvas.height, "black");
      drawNet();
      
      // Draw paddles with glow effect
      ctx.shadowColor = "#00FFFF";
      ctx.shadowBlur = 10;
      drawRect(player.x, player.y, paddleWidth, paddleHeight, "#00FFFF");
      drawRect(ai.x, ai.y, paddleWidth, paddleHeight, "#FF00FF");
      ctx.shadowBlur = 0;
      
      // Draw ball with trail effect
      ctx.shadowColor = "#FFFFFF";
      ctx.shadowBlur = 15;
      drawCircle(ball.x, ball.y, ball.radius, "white");
      ctx.shadowBlur = 0;
      
      drawScore();
    }

    function restartGame() {
      player.score = 0;
      ai.score = 0;
      gameRunning = true;
      resetBall();
      document.getElementById('gameOver').style.display = 'none';
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('playerScoreDisplay').textContent = player.score;
      document.getElementById('aiScoreDisplay').textContent = ai.score;
      document.getElementById('speedDisplay').textContent = ball.currentSpeed.toFixed(1) + 'x';
    }

    function showHelp() {
      alert('🏓 Pong.exe Help\n\nObjective: Beat the computer to 10 points!\n\nControls:\n• Mouse - Move your paddle (left side)\n\nGameplay:\n• Ball speed increases with each hit\n• Hit different parts of paddle for angle shots\n• First to 10 points wins!\n\nGood luck!');
    }

    function pauseGame() {
      gameRunning = !gameRunning;
      if (gameRunning) {
        alert('Game Resumed!');
      } else {
        alert('Game Paused!\nClick OK to resume.');
        gameRunning = true;
      }
    }

    function minimizeWindow() {
      alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)');
    }

    function game() {
      update();
      draw();
      updateHUD();
    }

    canvas.addEventListener("mousemove", movePaddle);
    updateHUD();
    setInterval(game, 1000 / 60);
  </script>
</body>
</html>
