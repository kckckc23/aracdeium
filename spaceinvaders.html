<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invaders.exe - Arcadeium</title>
    <link rel="stylesheet" href="retro-desktop.css">
</head>
<body>
    <!-- Game Menu Bar -->
    <div class="game-menu-bar">
        <a href="index.html" class="game-menu-button">← Desktop</a>
        <div class="game-menu-button" onclick="showHelp()">Help</div>
        <div class="game-menu-button" onclick="pauseGame()">Pause</div>
    </div>

    <!-- Game Window -->
    <div class="game-window">
        <div class="window-title">
            <span>👾 Invaders.exe - Arcadeium Games</span>
            <div class="window-controls">
                <div class="window-button" onclick="minimizeWindow()">_</div>
                <div class="window-button" onclick="window.location.href='index.html'">×</div>
            </div>
        </div>

        <div class="game-content">
            <!-- HUD Panel -->
            <div class="hud-panel">
                <div class="hud-item">
                    <span class="hud-label">Score:</span>
                    <span class="hud-value" id="score">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Lives:</span>
                    <span class="hud-value" id="lives">3</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Wave:</span>
                    <span class="hud-value" id="level">1</span>
                </div>
            </div>

            <!-- Game Canvas -->
            <div class="screen-cell"><canvas id="spaceinvaders" width="560" height="480"></canvas></div>

            <!-- Side panel: instructions + buttons -->
            <div class="side-cell">
            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-section">
                    <div class="control-title">Game Controls:</div>
                    <div class="control-text">
                        Arrow Keys: Move Ship • Space: Fire Laser<br>
                        Defend Earth from the alien invasion!
                    </div>
                </div>
            </div>

            <!-- Button Container -->
            <div class="button-container">
                <button class="retro-button primary" onclick="startNewGame()">New Game</button>
                <button class="retro-button" onclick="pauseGame()">Pause</button>
                <button class="retro-button" onclick="showHelp()">Help</button>
            </div>
            </div>
        </div>
    </div>

    <!-- Game Over Dialog -->
    <div class="game-over" id="gameOver" style="display: none;">
        <h2 id="gameOverTitle">Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="retro-button primary" onclick="restartGame()">Play Again</button>
        <button class="retro-button" onclick="window.location.href='index.html'">Back to Desktop</button>
    </div>

    <script>
        const canvas = document.getElementById('spaceinvaders');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // ── Audio (unchanged hooks) ──────────────────────────────────
        let audioEnabled = false;
        const invaderKilledSound = new Audio('music/spaceinvaders_invaderkilled.wav');
        const playerDeathSound  = new Audio('music/spaceinvaders_playerdeath.wav');
        const shootSound        = new Audio('music/spaceinvaders_shoot.wav');
        invaderKilledSound.volume = 0.5; playerDeathSound.volume = 0.7; shootSound.volume = 0.4;
        function enableAudio() {
            if (!audioEnabled) { audioEnabled = true; invaderKilledSound.load(); playerDeathSound.load(); shootSound.load(); }
        }
        function playSound(s) { if (audioEnabled) { s.currentTime = 0; s.play().catch(() => {}); } }

        // ── Pixel sprites (1 = filled) ───────────────────────────────
        const SQUID_A = ['00011000','00111100','01111110','11011011','11111111','01100110','01000010','00100100'];
        const SQUID_B = ['00011000','00111100','01111110','11011011','11111111','01100110','00100100','01000010'];
        const CRAB_A  = ['10000001','01000010','01111110','11011011','11111111','11111111','10100101','00100100'];
        const CRAB_B  = ['10000001','01000010','01111110','11011011','11111111','11111111','01000010','10100101'];
        const OCTO_A  = ['00111100','01111110','11111111','11100111','11111111','00111100','01100110','11000011'];
        const OCTO_B  = ['00111100','01111110','11111111','11100111','11111111','00111100','00100100','01011010'];
        const BOOM    = ['00100100','10100101','01011010','00111100','00111100','01011010','10100101','00100100'];
        const SHIP = [
            '0000001000000','0000011100000','0000011100000','0011111111100',
            '0111111111110','1111111111111','1111111111111','1111111111111'];
        const UFO = [
            '0000011111100000','0001111111111000','0011111111111100','0111111111111110',
            '1111101101011111','0011111111111100','0000110000110000'];
        const BUNKER_TPL = [
            '00111111111100','01111111111110','11111111111111','11111111111111',
            '11111111111111','11111111111111','11110000001111','11100000000111',
            '11100000000111','11100000000111'];

        const SCALE = 3;
        const INV_W = 8 * SCALE, INV_H = 8 * SCALE;     // 24×24
        const PITCH_X = 46, PITCH_Y = 38;
        const INV_STEP = 10, INV_DROP = 16;
        const SHIP_W = 13 * SCALE, SHIP_H = 8 * SCALE;  // 39×24
        const PB_SPEED = 540, IB_SPEED = 240, SHIP_SPEED = 230;  // px/sec
        const BUNKER_BLOCK = 3, BUNKER_Y = 372;

        const TYPES = [
            { frames: [SQUID_A, SQUID_B], color: '#ff6ad5', points: 30 },  // top row
            { frames: [CRAB_A,  CRAB_B ], color: '#ffe24a', points: 20 },  // middle
            { frames: [OCTO_A,  OCTO_B ], color: '#5cffb0', points: 10 }   // bottom
        ];

        // ── State ────────────────────────────────────────────────────
        let score, lives, level, state, paused, loopRunning, lastTs, animTime;
        let stateTimer = 0, animFrame = 0, invDir = 1, stepTimer = 0, fireTimer = 0, fireInterval = 1;
        let bullets, invaderBullets, invaders, bunkers, explosions, ufo;

        const player = { x: W / 2 - SHIP_W / 2, y: H - SHIP_H - 8, invuln: 0 };
        const keys = { left: false, right: false, space: false };

        function rand(a, b) { return a + Math.random() * (b - a); }

        // ── Build ────────────────────────────────────────────────────
        function createInvaders() {
            invaders = [];
            const rows = Math.min(4 + Math.floor((level - 1) / 3), 5);
            const cols = Math.min(7 + Math.floor((level - 1) / 2), 9);
            const startX = (W - cols * PITCH_X) / 2 + (PITCH_X - INV_W) / 2;
            const startY = 56;
            for (let r = 0; r < rows; r++) {
                const typeIndex = r === 0 ? 0 : r <= 2 ? 1 : 2;
                for (let c = 0; c < cols; c++) {
                    invaders.push({
                        x: startX + c * PITCH_X, y: startY + r * PITCH_Y,
                        col: c, alive: true, typeIndex
                    });
                }
            }
            invDir = 1; stepTimer = 0; animFrame = 0;
        }

        function createBunkers() {
            bunkers = [];
            const bw = BUNKER_TPL[0].length * BUNKER_BLOCK;
            const count = 4;
            const gap = (W - count * bw) / (count + 1);
            for (let i = 0; i < count; i++) {
                const grid = BUNKER_TPL.map(row => row.split('').map(ch => ch === '1'));
                bunkers.push({ x: gap + i * (bw + gap), y: BUNKER_Y, grid });
            }
        }

        function resetPlayer() { player.x = W / 2 - SHIP_W / 2; player.invuln = 0; }

        function newGame() {
            score = 0; lives = 3; level = 1;
            bullets = []; invaderBullets = []; explosions = [];
            ufo = null; paused = false; state = 'play';
            createInvaders(); createBunkers(); resetPlayer();
            stateTimer = 1.4; state = 'wavebanner';   // brief "WAVE 1" intro
            fireTimer = 0; fireInterval = rand(0.6, 1.4);
            updateDisplay();
            document.getElementById('gameOver').style.display = 'none';
            if (!loopRunning) { loopRunning = true; lastTs = 0; requestAnimationFrame(gameLoop); }
        }

        // ── Speed / difficulty curves ────────────────────────────────
        function stepInterval() {
            const alive = invaders.filter(i => i.alive).length;
            const total = invaders.length || 1;
            const base = Math.max(0.10, 0.52 - (level - 1) * 0.04);
            return Math.max(0.06, base * (0.2 + 0.8 * alive / total));
        }
        function maxInvaderBullets() { return Math.min(6, 1 + level); }

        // ── Drawing helpers ──────────────────────────────────────────
        function drawSprite(bm, x, y, s, color) {
            ctx.fillStyle = color;
            for (let r = 0; r < bm.length; r++)
                for (let c = 0; c < bm[r].length; c++)
                    if (bm[r][c] === '1') ctx.fillRect(Math.round(x + c * s), Math.round(y + r * s), s, s);
        }

        // ── Update ───────────────────────────────────────────────────
        function updatePlayer(dt) {
            if (keys.left)  player.x -= SHIP_SPEED * dt;
            if (keys.right) player.x += SHIP_SPEED * dt;
            player.x = Math.max(6, Math.min(W - SHIP_W - 6, player.x));
            if (player.invuln > 0) player.invuln -= dt;
        }

        function shoot() {
            if (state !== 'play' || bullets.length > 0) return;   // classic single shot
            bullets.push({ x: player.x + SHIP_W / 2 - 1.5, y: player.y - 6 });
            playSound(shootSound);
        }

        function updateBullets(dt) {
            bullets.forEach(b => b.y -= PB_SPEED * dt);
            bullets = bullets.filter(b => b.y > -12);
            invaderBullets.forEach(b => b.y += IB_SPEED * dt);
            invaderBullets = invaderBullets.filter(b => b.y < H);
        }

        function marchInvaders() {
            animFrame ^= 1;
            let minX = Infinity, maxX = -Infinity;
            invaders.forEach(i => { if (i.alive) { minX = Math.min(minX, i.x); maxX = Math.max(maxX, i.x + INV_W); } });
            if (minX === Infinity) return;
            const step = INV_STEP * invDir;
            if (minX + step < 6 || maxX + step > W - 6) {
                invDir *= -1;
                invaders.forEach(i => { if (i.alive) i.y += INV_DROP; });
            } else {
                invaders.forEach(i => { if (i.alive) i.x += step; });
            }
        }

        function updateInvaders(dt) {
            stepTimer += dt;
            if (stepTimer >= stepInterval()) { stepTimer = 0; marchInvaders(); }

            // erode bunkers the formation overlaps
            invaders.forEach(i => { if (i.alive && i.y + INV_H >= BUNKER_Y) eraseBunkerArea(i.x, i.y, INV_W, INV_H); });

            fireTimer += dt;
            if (fireTimer >= fireInterval && invaderBullets.length < maxInvaderBullets()) {
                fireTimer = 0;
                fireInterval = rand(0.35, Math.max(0.5, 1.3 - level * 0.08));
                const alive = invaders.filter(i => i.alive);
                if (alive.length) {
                    const cols = [...new Set(alive.map(i => i.col))];
                    const col = cols[Math.floor(Math.random() * cols.length)];
                    const shooter = alive.filter(i => i.col === col).sort((a, b) => b.y - a.y)[0];
                    invaderBullets.push({ x: shooter.x + INV_W / 2 - 1.5, y: shooter.y + INV_H });
                }
            }
        }

        function updateUFO(dt) {
            if (!ufo) {
                if (Math.random() < dt / 12) {   // ~ once every 12s on average
                    const dir = Math.random() < 0.5 ? 1 : -1;
                    ufo = { x: dir === 1 ? -40 : W + 40, y: 30, dir, points: [50, 100, 150, 300][Math.floor(Math.random() * 4)] };
                }
            } else {
                ufo.x += ufo.dir * 110 * dt;
                if (ufo.x < -60 || ufo.x > W + 60) ufo = null;
            }
        }

        // ── Bunkers ──────────────────────────────────────────────────
        function eraseBunkerArea(px, py, pw, ph) {
            bunkers.forEach(bk => {
                for (let r = 0; r < bk.grid.length; r++)
                    for (let c = 0; c < bk.grid[r].length; c++) {
                        if (!bk.grid[r][c]) continue;
                        const bx = bk.x + c * BUNKER_BLOCK, by = bk.y + r * BUNKER_BLOCK;
                        if (px < bx + BUNKER_BLOCK && px + pw > bx && py < by + BUNKER_BLOCK && py + ph > by)
                            bk.grid[r][c] = false;
                    }
            });
        }
        // returns true if a bullet (bx,by,bw,bh) hit a bunker block (and chips it)
        function bulletHitsBunker(bx, by, bw, bh) {
            for (const bk of bunkers) {
                for (let r = 0; r < bk.grid.length; r++)
                    for (let c = 0; c < bk.grid[r].length; c++) {
                        if (!bk.grid[r][c]) continue;
                        const x = bk.x + c * BUNKER_BLOCK, y = bk.y + r * BUNKER_BLOCK;
                        if (bx < x + BUNKER_BLOCK && bx + bw > x && by < y + BUNKER_BLOCK && by + bh > y) {
                            // chip a small cluster for chunky damage
                            for (let dr = -1; dr <= 1; dr++)
                                for (let dc = -1; dc <= 1; dc++) {
                                    const rr = r + dr, cc = c + dc;
                                    if (bk.grid[rr] && bk.grid[rr][cc] && Math.random() < 0.7) bk.grid[rr][cc] = false;
                                }
                            return true;
                        }
                    }
            }
            return false;
        }

        // ── Collisions ───────────────────────────────────────────────
        function checkCollisions() {
            // player bullet → bunkers, ufo, invaders
            bullets = bullets.filter(b => {
                if (bulletHitsBunker(b.x, b.y, 3, 12)) return false;
                if (ufo && b.x < ufo.x + UFO[0].length * SCALE && b.x + 3 > ufo.x &&
                    b.y < ufo.y + UFO.length * SCALE && b.y + 12 > ufo.y) {
                    score += ufo.points; explosions.push({ x: ufo.x + 20, y: ufo.y, t: 0.3, color: '#fff' });
                    ufo = null; playSound(invaderKilledSound); updateDisplay(); return false;
                }
                for (const inv of invaders) {
                    if (inv.alive && b.x < inv.x + INV_W && b.x + 3 > inv.x && b.y < inv.y + INV_H && b.y + 12 > inv.y) {
                        inv.alive = false;
                        score += TYPES[inv.typeIndex].points;
                        explosions.push({ x: inv.x, y: inv.y, t: 0.18, color: TYPES[inv.typeIndex].color });
                        playSound(invaderKilledSound); updateDisplay();
                        return false;
                    }
                }
                return true;
            });

            // invader bullets → bunkers, player
            invaderBullets = invaderBullets.filter(b => {
                if (bulletHitsBunker(b.x, b.y, 3, 12)) return false;
                if (player.invuln <= 0 && b.x < player.x + SHIP_W && b.x + 3 > player.x &&
                    b.y < player.y + SHIP_H && b.y + 12 > player.y) {
                    hitPlayer(); return false;
                }
                return true;
            });

            // invaders reaching the ground line
            if (invaders.some(i => i.alive && i.y + INV_H >= player.y)) { endGame(); }
        }

        function hitPlayer() {
            lives--; updateDisplay();
            explosions.push({ x: player.x + 6, y: player.y, t: 0.4, color: '#5cffb0' });
            playSound(playerDeathSound);
            if (lives <= 0) { endGame(); return; }
            state = 'respawn'; stateTimer = 1.2;
            invaderBullets = [];
            player.invuln = 2.0;
        }

        function endGame() {
            state = 'over';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverTitle').textContent = 'GAME OVER';
            document.getElementById('gameOver').style.display = 'block';
        }

        function updateExplosions(dt) {
            explosions.forEach(e => e.t -= dt);
            explosions = explosions.filter(e => e.t > 0);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        // ── Render ───────────────────────────────────────────────────
        function render() {
            ctx.fillStyle = '#04040a';
            ctx.fillRect(0, 0, W, H);

            // ground line
            ctx.strokeStyle = '#1c7a3a'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, player.y + SHIP_H + 4); ctx.lineTo(W, player.y + SHIP_H + 4); ctx.stroke();

            // bunkers
            ctx.fillStyle = '#4dff88';
            bunkers.forEach(bk => {
                for (let r = 0; r < bk.grid.length; r++)
                    for (let c = 0; c < bk.grid[r].length; c++)
                        if (bk.grid[r][c]) ctx.fillRect(bk.x + c * BUNKER_BLOCK, bk.y + r * BUNKER_BLOCK, BUNKER_BLOCK, BUNKER_BLOCK);
            });

            // invaders
            invaders.forEach(i => {
                if (!i.alive) return;
                const t = TYPES[i.typeIndex];
                drawSprite(t.frames[animFrame], i.x, i.y, SCALE, t.color);
            });

            // ufo
            if (ufo) drawSprite(UFO, ufo.x, ufo.y, SCALE, '#ff4533');

            // bullets
            ctx.fillStyle = '#ffffff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 12));
            ctx.fillStyle = '#ff6a6a';
            invaderBullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 12));

            // player (blink while invulnerable)
            if (!(player.invuln > 0 && Math.floor(animTime * 12) % 2)) drawSprite(SHIP, player.x, player.y, SCALE, '#5cffb0');

            // explosions
            explosions.forEach(e => drawSprite(BOOM, e.x, e.y, SCALE, e.color));

            if (state === 'wavebanner') banner('WAVE ' + level);
            if (paused) overlay('PAUSED');
        }

        function banner(text) {
            ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(0, H / 2 - 30, W, 60);
            ctx.fillStyle = '#ffe21f'; ctx.font = 'bold 26px "Press Start 2P", monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, W / 2, H / 2);
        }
        function overlay(text) {
            ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffe21f'; ctx.font = 'bold 24px "Press Start 2P", monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, W / 2, H / 2);
        }

        // ── State machine update ─────────────────────────────────────
        function update(dt) {
            if (state === 'wavebanner') {
                stateTimer -= dt;
                if (stateTimer <= 0) state = 'play';
                return;
            }
            if (state === 'respawn') {
                updatePlayer(dt); updateExplosions(dt); updateUFO(dt);
                stateTimer -= dt;
                if (stateTimer <= 0) state = 'play';
                return;
            }
            // play
            updatePlayer(dt);
            updateBullets(dt);
            updateInvaders(dt);
            updateUFO(dt);
            updateExplosions(dt);
            checkCollisions();
            if (state === 'over') return;

            if (invaders.every(i => !i.alive)) {           // wave cleared — once
                level++;
                updateDisplay();
                createInvaders(); resetPlayer();
                bullets = []; invaderBullets = [];
                state = 'wavebanner'; stateTimer = 1.6;
            }
        }

        function gameLoop(ts) {
            if (!lastTs) lastTs = ts;
            const dt = Math.min((ts - lastTs) / 1000, 0.05);
            lastTs = ts; animTime += dt;
            if (!paused && state !== 'over') update(dt);
            render();
            if (state === 'over') { loopRunning = false; return; }
            requestAnimationFrame(gameLoop);
        }

        // ── UI hooks ─────────────────────────────────────────────────
        function startNewGame() { newGame(); }
        function restartGame() { newGame(); }
        function pauseGame() { if (state !== 'over') paused = !paused; }
        function showHelp() {
            alert('👾 Invaders.exe Help\n\nObjective: Clear every wave of aliens!\n\nControls:\n• Arrow Keys - Move ship\n• Space - Fire (one shot at a time)\n\nGameplay:\n• Squid 30 / Crab 20 / Octopus 10 pts\n• Hide behind bunkers — but they erode\n• Catch the red UFO for bonus points\n• Aliens speed up as their numbers thin\n\nGood luck, defender!');
        }
        function minimizeWindow() { alert('💻 Minimize\n\nWindow minimized to taskbar!\n(This is just a demo)'); }

        document.addEventListener('keydown', (e) => {
            enableAudio();
            switch (e.key) {
                case 'ArrowLeft':  e.preventDefault(); keys.left = true; break;
                case 'ArrowRight': e.preventDefault(); keys.right = true; break;
                case ' ': e.preventDefault(); if (!keys.space) { shoot(); keys.space = true; } break;
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            else if (e.key === 'ArrowRight') keys.right = false;
            else if (e.key === ' ') keys.space = false;
        });
        document.addEventListener('click', enableAudio);

        // ── Boot ─────────────────────────────────────────────────────
        newGame();
    </script>
</body>
</html>
